index.html<!DOCTYPE html>
<html>
<head>
  <title>Real Chat System</title>
  <style>
    body { font-family: Arial; background:#f1f1f1; }
    .box { width:90%; max-width:500px; margin:auto; margin-top:40px; background:white; padding:15px; border-radius:10px; }
    #chat { height:300px; overflow-y:scroll; border:1px solid #ccc; padding:10px; }
    input { width:75%; padding:10px; }
    button { padding:10px; }
  </style>
</head>
<body>

<div class="box">
  <h2>Nics tech Chat System</h2>

  <div id="chat"></div><br>

  <input id="msg" placeholder="Andika ujumbe...">
  <button onclick="sendMsg()">Tuma</button>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, collection, addDoc, onSnapshot, orderBy, query } 
  from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  //nicscomputerskills1@gmail.com
  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_AUTH_DOMAIN",
    projectId: "computer teching_ID",
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const q = query(collection(db, "messages"), orderBy("time"));

  onSnapshot(q, (snapshot) => {
    let chat = document.getElementById("chat");
    chat.innerHTML = "";

    snapshot.forEach(doc => {
      chat.innerHTML += "<p>" + doc.data().text + "</p>";
    });

    chat.scrollTop = chat.scrollHeight;
  });

  window.sendMsg = async function() {
    let msg = document.getElementById("msg").value;
    if(msg === "") return;

    await addDoc(collection(db, "messages"), {
      text: msg,
      time: Date.now()
    });

    document.getElementById("msg").value = "";
  }
</script>

</body>
</html>
